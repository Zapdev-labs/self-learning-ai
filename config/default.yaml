# ASSBRAIN — Default Configuration (9B Multimodal Scratch Model)
app:
  name: "ASSBRAIN"
  version: "0.2.0"
  mode: "development"
  log_level: "INFO"
  data_dir: "./data"
  memory_dir: "./memory"
  models_dir: "./models"
  projects_dir: "./projects"
  logs_dir: "./logs"

# LLM Engine Settings — 9B Multimodal Transformer from Scratch
llm:
  mode: "scratch"
  device: "auto"
  compile: true
  use_tools: true

  # ---- Text Model (9B params) ----
  vocab_size: 32000
  block_size: 4096
  n_layer: 48
  n_head: 32
  n_embd: 4096
  dropout: 0.0
  ffn_mult: 4.0
  multiple_of: 256
  tie_weights: true
  use_gradient_checkpointing: true

  # ---- Vision Model ----
  img_size: 336
  patch_size: 14
  vision_embed_dim: 1024
  vision_n_layers: 24
  vision_n_heads: 16

  # ---- Generation ----
  max_new_tokens: 2048
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  context_window: 4096
  batch_size: 1

  # ---- Training (A40-optimized) ----
  training:
    learning_rate: 1.0e-4
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16
    num_train_epochs: 1
    max_steps: 500
    warmup_steps: 50
    logging_steps: 5
    save_steps: 100
    output_dir: "./models/checkpoints"

# Self-Learning Loop
learning:
  max_attempts_per_task: 5
  reward_threshold: 0.8
  curriculum_enabled: true
  self_critique_enabled: true
  imitation_learning_enabled: true
  error_analysis_depth: "deep"
  experience_buffer_size: 100000
  training_frequency: 5
  explore_vs_exploit: 0.3

# Memory / Vector Store
memory:
  backend: "chroma"
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  collection_name: "assbrain_memory"
  similarity_threshold: 0.75
  max_context_memories: 5

# Evaluation & Sandbox
evaluation:
  sandbox_type: "subprocess"
  timeout_seconds: 120
  max_memory_mb: 4096
  allow_network: false
  allowed_imports: ["numpy", "pandas", "torch", "sklearn", "matplotlib", "seaborn", "transformers", "datasets", "fastapi", "pydantic", "PIL"]
  blocked_imports: ["os.system", "subprocess.call", "eval", "exec", "compile", "open", "importlib"]
  auto_install_deps: true

# Browser / Web Testing
browser:
  headless: true
  screenshot_on_fail: true
  viewport_width: 1280
  viewport_height: 720
  default_timeout: 30000

# LSP Integration
lsp:
  python_server: "pylsp"
  typescript_server: "typescript-language-server"
  startup_timeout: 10
  diagnostics_enabled: true

# MCP (Model Context Protocol)
mcp:
  servers: []

# Code Generation
generation:
  supported_languages: ["python", "typescript", "javascript", "json", "yaml", "markdown", "html", "css"]
  project_templates_dir: "./config/templates"
  nextjs:
    version: "14"
    app_router: true
    tailwind: true
    shadcn: true
    default_packages: ["next", "react", "react-dom", "typescript", "@types/node", "@types/react", "@types/react-dom", "tailwindcss", "postcss", "autoprefixer"]

# Pi Integration
pi:
  enabled: true
  adapter_port: 8765
  model_alias: "assbrain-local"
  streaming: true
